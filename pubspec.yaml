name: fictionist
description: "Worldbuilding entity manager for novelists."
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ──
  go_router: ^14.8.0

  # ── Dependency Injection ──
  get_it: ^8.0.3
  injectable: ^2.5.0

  # ── Database ──
  drift: ^2.23.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # ── Code Generation Runtime ──
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # ── Functional Programming ──
  fpdart: ^1.1.0

  # ── UUID ──
  uuid: ^4.5.1

  # ── UI ──
  flutter_markdown: ^0.7.7
  flutter_quill: "any"
  flutter_colorpicker: ^1.1.0
  flutter_slidable: ^3.1.2
  reorderable_grid_view: ^2.2.8
  google_fonts: ^6.2.1
  graphview: ^1.2.0
  sticky_headers: ^0.3.0+2

  # ── Utilities ──
  equatable: ^2.0.7
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  permission_handler: ^11.3.1
  collection: ^1.19.1
  archive: ^4.0.9
  pdf: ^3.12.0
  flutter_animate: ^4.5.2
  sqlcipher_flutter_libs: ^0.7.0+eol
  encrypt: ^5.0.3
  flutter_launcher_icons: ^0.14.4
  dev: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ──
  build_runner: ^2.4.14
  drift_dev: ^2.23.0
  riverpod_generator: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0

  # ── Testing ──
  mocktail: ^1.0.4

  # ── Linting ──
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/templates/
    - assets/name_generator/
    - assets/name_generator/cultures/
