name: fictionist
description: "Worldbuilding entity manager for novelists."
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  archive: ^4.0.9
  collection: ^1.19.1
  dev: ^1.0.0
  drift: ^2.23.0
  encrypt: ^5.0.3
  equatable: ^2.0.7
  file_picker: ^8.1.7
  flutter_animate: ^4.5.2
  flutter_colorpicker: ^1.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_markdown: ^0.7.7
  flutter_quill: "any"
  flutter_riverpod: ^2.5.1
  flutter_slidable: ^3.1.2
  fpdart: ^1.1.0
  freezed_annotation: ^3.0.0
  get_it: ^8.0.3
  go_router: ^14.8.0
  google_fonts: ^6.2.1
  graphview: ^1.2.0
  injectable: ^2.5.0
  json_annotation: ^4.9.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.12.0
  permission_handler: ^11.3.1
  reorderable_grid_view: ^2.2.8
  riverpod_annotation: ^2.3.5
  share_plus: ^10.1.4
  sqlcipher_flutter_libs: ^0.7.0+eol
  sqlite3_flutter_libs: ^0.5.30
  sticky_headers: ^0.3.0+2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.14
  drift_dev: ^2.23.0
  freezed: ^3.0.0
  injectable_generator: ^2.7.0
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  riverpod_generator: ^2.4.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/templates/
    - assets/name_generator/
    - assets/name_generator/cultures/
