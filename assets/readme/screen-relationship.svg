<svg width="360" height="640" viewBox="0 0 360 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone body -->
  <rect width="360" height="640" rx="32" fill="#0D0B11"/>
  <rect x="1" y="1" width="358" height="638" rx="31" stroke="#3A3445" stroke-width="2"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="360" height="44" rx="32" fill="#120E16"/>
  <rect x="0" y="32" width="360" height="12" fill="#120E16"/>
  <text x="20" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#9E9AA6">9:41</text>

  <!-- Blurred background (entity detail faded) -->
  <rect x="0" y="0" width="360" height="640" fill="#120E16" opacity="0.8"/>
  <!-- dim overlay -->
  <rect x="0" y="0" width="360" height="640" fill="#000000" opacity="0.5"/>

  <!-- Modal bottom sheet -->
  <rect x="0" y="200" width="360" height="440" rx="20" fill="#1E1A24"/>
  <!-- Sheet handle -->
  <rect x="152" y="212" width="56" height="4" rx="2" fill="#3A3445"/>

  <!-- Modal title -->
  <text x="20" y="248" font-family="Georgia, serif" font-weight="700" font-size="18" fill="#E2E0E6">Link Entities</text>
  <line x1="20" y1="258" x2="340" y2="258" stroke="#3A3445" stroke-width="1"/>

  <!-- Source entity -->
  <text x="20" y="280" font-family="'Segoe UI', Arial" font-size="10" fill="#9E9AA6">SOURCE</text>
  <rect x="16" y="286" width="328" height="40" rx="8" fill="#2D2836" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.5"/>
  <text x="28" y="312" font-family="'Segoe UI', Arial" font-size="14" fill="#A78BFA">👤 Elidor Thorne</text>

  <!-- Arrow -->
  <text x="180" y="350" font-family="'Segoe UI', Arial" font-size="16" fill="#9E9AA6" text-anchor="middle">↓</text>

  <!-- Relationship type label -->
  <text x="20" y="374" font-family="'Segoe UI', Arial" font-size="10" fill="#9E9AA6">RELATIONSHIP TYPE</text>

  <!-- Relationship type pills -->
  <rect x="16" y="380" width="90" height="28" rx="14" fill="#2D2836" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="61" y="399" font-family="'Segoe UI', Arial" font-size="11" fill="#A78BFA" text-anchor="middle">exiled_by ✓</text>

  <rect x="114" y="380" width="82" height="28" rx="14" fill="#1E1A24" stroke="#3A3445" stroke-width="1"/>
  <text x="155" y="399" font-family="'Segoe UI', Arial" font-size="11" fill="#9E9AA6" text-anchor="middle">member_of</text>

  <rect x="204" y="380" width="78" height="28" rx="14" fill="#1E1A24" stroke="#3A3445" stroke-width="1"/>
  <text x="243" y="399" font-family="'Segoe UI', Arial" font-size="11" fill="#9E9AA6" text-anchor="middle">leads</text>

  <!-- Arrow -->
  <text x="180" y="432" font-family="'Segoe UI', Arial" font-size="16" fill="#9E9AA6" text-anchor="middle">↓</text>

  <!-- Target entity -->
  <text x="20" y="454" font-family="'Segoe UI', Arial" font-size="10" fill="#9E9AA6">TARGET ENTITY</text>
  <rect x="16" y="460" width="328" height="40" rx="8" fill="#2D2836" stroke="#3A3445" stroke-width="1"/>
  <text x="28" y="480" font-family="'Segoe UI', Arial" font-size="11" fill="#9E9AA6">Search entity...</text>
  <!-- Search result -->
  <rect x="16" y="502" width="328" height="38" rx="8" fill="#1E1A24" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.5"/>
  <text x="32" y="526" font-family="'Segoe UI', Arial" font-size="14" fill="#F59E0B">🛡 Genius Society</text>

  <!-- Description -->
  <text x="20" y="562" font-family="'Segoe UI', Arial" font-size="10" fill="#9E9AA6">DESCRIPTION (OPTIONAL)</text>
  <rect x="16" y="568" width="328" height="32" rx="8" fill="#2D2836" stroke="#3A3445" stroke-width="1"/>
  <text x="28" y="589" font-family="'Segoe UI', Arial" font-size="12" fill="#9E9AA6">Wrote thesis on anomaly...</text>

  <!-- Buttons -->
  <rect x="16" y="606" width="148" height="24" rx="12" fill="#2D2836"/>
  <text x="90" y="623" font-family="'Segoe UI', Arial" font-size="12" fill="#9E9AA6" text-anchor="middle">Cancel</text>
  <rect x="172" y="606" width="172" height="24" rx="12" fill="#A78BFA"/>
  <text x="258" y="623" font-family="'Segoe UI', Arial" font-size="12" fill="#120E16" text-anchor="middle" font-weight="700">Link ✓</text>
</svg>
