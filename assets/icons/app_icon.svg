<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="penGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#3B0764" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#F5F3FF"/>

  <!-- Book base -->
  <g filter="url(#softShadow)">
    <!-- Left page -->
    <path d="M256 200 L120 176 C110 174 102 182 102 192 L102 360 C102 370 110 378 120 376 L256 400 Z" fill="#EDE9FE"/>
    <!-- Right page -->
    <path d="M256 200 L392 176 C402 174 410 182 410 192 L410 360 C410 370 402 378 392 376 L256 400 Z" fill="#DDD6FE"/>
    <!-- Book spine/cover -->
    <path d="M256 200 L256 400 L256 400 Z" fill="url(#bookGradient)"/>
    <rect x="250" y="196" width="12" height="208" rx="4" fill="url(#bookGradient)"/>

    <!-- Page lines left -->
    <line x1="130" y1="216" x2="230" y2="230" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
    <line x1="130" y1="244" x2="230" y2="256" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
    <line x1="130" y1="272" x2="230" y2="282" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>

    <!-- Page lines right -->
    <line x1="282" y1="230" x2="382" y2="216" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
    <line x1="282" y1="256" x2="382" y2="244" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
    <line x1="282" y1="282" x2="382" y2="272" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Pen diagonally above the book -->
  <g transform="translate(256 210) rotate(-40)" filter="url(#softShadow)">
    <!-- Pen body -->
    <rect x="-16" y="-170" width="32" height="150" rx="16" fill="url(#penGradient)"/>
    <!-- Pen grip section -->
    <rect x="-16" y="-40" width="32" height="34" fill="#6D28D9"/>
    <!-- Pen tip -->
    <path d="M-16 -6 L16 -6 L0 26 Z" fill="#4C1D95"/>
    <!-- Pen clip -->
    <rect x="-4" y="-168" width="8" height="60" rx="4" fill="#F5F3FF" opacity="0.85"/>
    <!-- Pen top cap -->
    <rect x="-18" y="-182" width="36" height="18" rx="9" fill="#5B21B6"/>
  </g>
</svg>
